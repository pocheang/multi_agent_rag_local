name: Quality Gate

on:
  pull_request:
  workflow_dispatch:

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Minimal Deps
        run: |
          python -m pip install --upgrade pip
          pip install -e . || true
      - name: Run Quality Gate
        run: |
          python scripts/ci_quality_gate.py --dataset data/eval/retrieval_eval.jsonl --min-recall 0.35 --auto-rollback-file artifacts/rollback.env --report-md artifacts/quality-report.md
      - name: Upload Rollback Profile
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rollback-profile
          path: artifacts/rollback.env
          if-no-files-found: ignore
      - name: Upload Quality Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-report
          path: artifacts/quality-report.md
          if-no-files-found: ignore
